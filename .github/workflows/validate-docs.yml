name: Validate Docs Consistency

on:
  pull_request:
    paths:
      - "Runtime/src/ffi_exports.rs"
      - "Docs/**"
      - ".github/workflows/validate-docs.yml"
  workflow_dispatch:

jobs:
  ffi-count:
    name: Validate FFI Export Count
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare documented count with actual exports
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          ffi_file = pathlib.Path("Runtime/src/ffi_exports.rs")
          docs_file = pathlib.Path("Docs/src/ffi-reference/index.md")

          actual = ffi_file.read_text(encoding="utf-8").count("#[unsafe(no_mangle)]")
          docs_text = docs_file.read_text(encoding="utf-8")
          match = re.search(r"exports \*\*(\d+)\*\* functions", docs_text)

          if not match:
              print("::error file=Docs/src/ffi-reference/index.md::Unable to find documented FFI export count.")
              sys.exit(1)

          documented = int(match.group(1))
          print(f"Actual exports: {actual}")
          print(f"Documented exports: {documented}")

          if actual != documented:
              print(f"::error file=Docs/src/ffi-reference/index.md::Mismatch: code={actual} docs={documented}")
              sys.exit(1)
          PY
