name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build Site
        run: mdbook build
        working-directory: Docs

      - name: Generate Sitemap
        working-directory: Docs
        run: |
          python3 - << 'PYEOF'
          import os, datetime, xml.etree.ElementTree as ET

          base_url = "https://nicy-luau.github.io/Runtime/"
          build_dir = "book"
          today = datetime.date.today().isoformat()

          root = ET.Element("urlset", xmlns="http://www.sitemaps.org/schemas/sitemap/0.9")

          for dirpath, dirs, files in os.walk(build_dir):
              for f in files:
                  if f.endswith(".html") and f != "print.html":
                      full = os.path.join(dirpath, f)
                      rel = os.path.relpath(full, build_dir)
                      if rel == "index.html":
                          loc = base_url
                      elif rel.endswith("/index.html"):
                          loc = base_url + rel[:-len("index.html")]
                      else:
                          loc = base_url + rel.replace(".html", "") + "/"

                      url = ET.SubElement(root, "url")
                      ET.SubElement(url, "loc").text = loc
                      ET.SubElement(url, "lastmod").text = today
                      ET.SubElement(url, "priority").text = "1.0" if loc == base_url else "0.8"
                      ET.SubElement(url, "changefreq").text = "weekly"

          tree = ET.ElementTree(root)
          ET.indent(tree, space="  ")
          tree.write(os.path.join(build_dir, "sitemap.xml"), encoding="UTF-8", xml_declaration=True)
          print(f"Generated sitemap.xml with {len(root)} URLs")
          PYEOF

      - name: Generate robots.txt
        working-directory: Docs
        run: |
          cat > book/robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://nicy-luau.github.io/Runtime/sitemap.xml
          EOF

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs/book

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
