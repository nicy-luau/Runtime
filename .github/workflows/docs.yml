name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.40"

      - name: Build Site
        run: mdbook build
        working-directory: Docs

      - name: Generate Sitemap
        working-directory: Docs
        run: |
          python3 scripts/generate-sitemap.py \
            --base-url https://nicy-luau.github.io/Runtime/ \
            --book-dir book \
            --output book/sitemap.xml

      - name: Validate Sitemap
        working-directory: Docs
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          import sys

          tree = ET.parse('book/sitemap.xml')
          root = tree.getroot()
          ns = {'sm': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          urls = root.findall('sm:url', ns)

          if len(urls) < 5:
              print(f'::error::Sitemap has only {len(urls)} URLs. Expected at least 5.')
              sys.exit(1)

          print(f'✓ Sitemap valid: {len(urls)} URLs')
          "

      - name: Generate robots.txt
        working-directory: Docs
        run: |
          cat > book/robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://nicy-luau.github.io/Runtime/sitemap.xml
          EOF

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs/book

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
