name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build Site
        run: mdbook build
        working-directory: Docs

      - name: Generate Sitemap
        run: python3 Docs/scripts/generate-sitemap.py --book-dir Docs/book

      - name: Validate Sitemap
        run: |
          python3 - <<'PY'
          import pathlib
          import xml.etree.ElementTree as ET

          sitemap_path = pathlib.Path("Docs/book/sitemap.xml")
          if not sitemap_path.is_file():
              raise SystemExit("sitemap.xml was not generated")

          tree = ET.parse(sitemap_path)
          root = tree.getroot()
          urls = root.findall("{http://www.sitemaps.org/schemas/sitemap/0.9}url")
          print(f"Sitemap path: {sitemap_path}")
          print(f"URL count: {len(urls)}")

          if len(urls) < 5:
              raise SystemExit("sitemap.xml contains fewer than 5 URLs")

          print("Preview:")
          for url in urls[:5]:
              print(f" - {url.findtext('{http://www.sitemaps.org/schemas/sitemap/0.9}loc')}")
          PY

      - name: Generate robots.txt
        working-directory: Docs
        run: |
          cat > book/robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://nicy-luau.github.io/Runtime/sitemap.xml
          EOF

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs/book

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
