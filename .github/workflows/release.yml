name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              name: win-x64,
              target: x86_64-pc-windows-msvc,
              os: windows-latest,
              use_msvc: true,
            }
          - {
              name: win-x86,
              target: i686-pc-windows-msvc,
              os: windows-latest,
              use_msvc: true,
            }
          - {
              name: win-arm,
              target: aarch64-pc-windows-msvc,
              os: windows-latest,
              use_msvc: true,
              allow_failure: true,
            }
          - { name: mac-x64, target: x86_64-apple-darwin, os: macos-latest }
          - { name: mac-arm, target: aarch64-apple-darwin, os: macos-latest }
          - {
              name: linux-x64,
              target: x86_64-unknown-linux-gnu.2.17,
              os: ubuntu-latest,
            }
          - {
              name: linux-arm,
              target: aarch64-unknown-linux-gnu.2.17,
              os: ubuntu-latest,
            }
          - {
              name: linux-x86,
              target: i686-unknown-linux-gnu.2.17,
              os: ubuntu-latest,
            }
          - {
              name: android-arm,
              target: aarch64-linux-android,
              os: ubuntu-latest,
              use_ndk: true,
            }
          - {
              name: android-v7,
              target: armv7-linux-androideabi,
              os: ubuntu-latest,
              use_ndk: true,
            }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Target
        shell: pwsh
        run: |
          $pureTarget = "${{ matrix.target }}".Split(".")[0]
          rustup target add $pureTarget

      - name: Setup Zig
        if: ${{ !matrix.use_ndk && !matrix.use_cross && !matrix.use_msvc }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Setup Android NDK
        if: ${{ matrix.use_ndk == true }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install Tools
        shell: pwsh
        run: |
          if ("${{ matrix.use_ndk }}" -eq "true") {
            cargo install cargo-ndk --locked
          } elseif ("${{ matrix.use_cross }}" -eq "true") {
            cargo install cross --git https://github.com/cross-rs/cross --locked
          } elseif ("${{ matrix.use_msvc }}" -ne "true") {
            cargo install cargo-zigbuild --locked
          }

      - name: Build CLI and Runtime
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $pureTarget = $target.Split(".")[0]

          if ("${{ matrix.use_msvc }}" -eq "true") {
            # MSVC: build CLI and Runtime separately with cargo
            cargo build --release --target $target --manifest-path Nicy/Cargo.toml --target-dir target
            cargo build --release --target $target --manifest-path Runtime/Cargo.toml --target-dir target
          } elseif ("${{ matrix.use_ndk }}" -eq "true") {
            # Android: use cargo-ndk for both
            cargo ndk -t $pureTarget build --release --manifest-path Nicy/Cargo.toml --target-dir target
            cargo ndk -t $pureTarget build --release --manifest-path Runtime/Cargo.toml --target-dir target
          } else {
            # Linux/macOS: use cargo-zigbuild
            cargo zigbuild --release --target $pureTarget --manifest-path Nicy/Cargo.toml --target-dir target
            cargo zigbuild --release --target $pureTarget --manifest-path Runtime/Cargo.toml --target-dir target
          }

      - name: Package Artifacts
        shell: pwsh
        run: |
          $cleanTarget = "${{ matrix.target }}".Replace(".2.17", "")
          $outDir = "target/$cleanTarget/release"

          $cliName = if ("${{ matrix.name }}" -like "win-*") { "nicy.exe" } else { "nicy" }
          $runtimeName = if ("${{ matrix.name }}" -like "win-*") {
            "nicyruntime.dll"
          } elseif ("${{ matrix.name }}" -like "mac-*") {
            "libnicyruntime.dylib"
          } else {
            "libnicyruntime.so"
          }

          $cliPath = Join-Path $outDir $cliName
          $runtimePath = Join-Path $outDir $runtimeName

          if (-not (Test-Path $cliPath)) {
            throw "CLI binary not found: $cliPath"
          }
          if (-not (Test-Path $runtimePath)) {
            throw "Runtime binary not found: $runtimePath"
          }

          $artifactDir = "dist/nicy-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item $cliPath (Join-Path $artifactDir $cliName) -Force
          Copy-Item $runtimePath (Join-Path $artifactDir $runtimeName) -Force

          Compress-Archive -Path "$artifactDir/*" -DestinationPath "dist/nicy-${{ matrix.name }}.zip" -Force

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
